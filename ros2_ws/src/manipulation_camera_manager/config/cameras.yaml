camera_manager:
  ros__parameters:
    camera_names: [top, wrist_a, wrist_b]
    capture.width: 640
    capture.height: 480
    capture.fps: 30
    capture.buffer_count: 4
    capture.disable_dynamic_framerate: true
    reconnect_interval_ms: 500
    frame_timeout_ms: 1500
    stale_after_ms: 500
    diagnostic_rate_hz: 1.0
    scheduler_tick_hz: 100.0
    statistics_window_samples: 300
    limits.max_frame_age_p95_ms: 200.0
    limits.max_decode_p95_ms: 50.0
    vision.max_total_inference_hz: 12.0
    initial_phase: STANDBY
    phase_names: [STANDBY, SEARCH, APPROACH_RIGHT, VISUAL_ALIGN_RIGHT, TRANSFER_RIGHT, VERIFY_RIGHT, DUAL_PRIVATE, POLICY_ASSIST]
    top.device_path: /dev/v4l/by-path/platform-xhci-hcd.1-usb-0:1.1:1.0-video-index0
    wrist_a.device_path: /dev/v4l/by-path/platform-xhci-hcd.1-usb-0:1.2:1.0-video-index0
    wrist_b.device_path: /dev/v4l/by-path/platform-xhci-hcd.1-usb-0:1.3:1.0-video-index0
    schedule.STANDBY.top.decode_hz: 1.0
    schedule.STANDBY.top.inference_hz: 1.0
    schedule.STANDBY.wrist_a.decode_hz: 0.0
    schedule.STANDBY.wrist_a.inference_hz: 0.0
    schedule.STANDBY.wrist_b.decode_hz: 0.0
    schedule.STANDBY.wrist_b.inference_hz: 0.0
    schedule.SEARCH.top.decode_hz: 10.0
    schedule.SEARCH.top.inference_hz: 8.0
    schedule.SEARCH.wrist_a.decode_hz: 0.0
    schedule.SEARCH.wrist_a.inference_hz: 0.0
    schedule.SEARCH.wrist_b.decode_hz: 0.0
    schedule.SEARCH.wrist_b.inference_hz: 0.0
    schedule.APPROACH_RIGHT.top.decode_hz: 6.0
    schedule.APPROACH_RIGHT.top.inference_hz: 4.0
    schedule.APPROACH_RIGHT.wrist_a.decode_hz: 0.0
    schedule.APPROACH_RIGHT.wrist_a.inference_hz: 0.0
    schedule.APPROACH_RIGHT.wrist_b.decode_hz: 8.0
    schedule.APPROACH_RIGHT.wrist_b.inference_hz: 6.0
    schedule.VISUAL_ALIGN_RIGHT.top.decode_hz: 2.0
    schedule.VISUAL_ALIGN_RIGHT.top.inference_hz: 1.0
    schedule.VISUAL_ALIGN_RIGHT.wrist_a.decode_hz: 0.0
    schedule.VISUAL_ALIGN_RIGHT.wrist_a.inference_hz: 0.0
    schedule.VISUAL_ALIGN_RIGHT.wrist_b.decode_hz: 12.0
    schedule.VISUAL_ALIGN_RIGHT.wrist_b.inference_hz: 10.0
    schedule.TRANSFER_RIGHT.top.decode_hz: 3.0
    schedule.TRANSFER_RIGHT.top.inference_hz: 2.0
    schedule.TRANSFER_RIGHT.wrist_a.decode_hz: 0.0
    schedule.TRANSFER_RIGHT.wrist_a.inference_hz: 0.0
    schedule.TRANSFER_RIGHT.wrist_b.decode_hz: 2.0
    schedule.TRANSFER_RIGHT.wrist_b.inference_hz: 1.0
    schedule.VERIFY_RIGHT.top.decode_hz: 6.0
    schedule.VERIFY_RIGHT.top.inference_hz: 4.0
    schedule.VERIFY_RIGHT.wrist_a.decode_hz: 0.0
    schedule.VERIFY_RIGHT.wrist_a.inference_hz: 0.0
    schedule.VERIFY_RIGHT.wrist_b.decode_hz: 6.0
    schedule.VERIFY_RIGHT.wrist_b.inference_hz: 4.0
    schedule.DUAL_PRIVATE.top.decode_hz: 6.0
    schedule.DUAL_PRIVATE.top.inference_hz: 4.0
    schedule.DUAL_PRIVATE.wrist_a.decode_hz: 5.0
    schedule.DUAL_PRIVATE.wrist_a.inference_hz: 4.0
    schedule.DUAL_PRIVATE.wrist_b.decode_hz: 5.0
    schedule.DUAL_PRIVATE.wrist_b.inference_hz: 4.0
    schedule.POLICY_ASSIST.top.decode_hz: 6.0
    schedule.POLICY_ASSIST.top.inference_hz: 4.0
    schedule.POLICY_ASSIST.wrist_a.decode_hz: 0.0
    schedule.POLICY_ASSIST.wrist_a.inference_hz: 0.0
    schedule.POLICY_ASSIST.wrist_b.decode_hz: 8.0
    schedule.POLICY_ASSIST.wrist_b.inference_hz: 6.0
