default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.5

joint_limits:
  left_base_joint: &arm_joint_limits
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 1.0
  left_shoulder_joint: *arm_joint_limits
  left_elbow_joint: *arm_joint_limits
  left_wrist_flex_joint: *arm_joint_limits
  left_wrist_roll_joint: *arm_joint_limits
  left_gripper_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 2.0
